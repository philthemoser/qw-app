const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const SCALE_INTERVALS = {

  major: [0, 4, 7],
  minor: [0, 3, 7]

  minor: ["minor", "minor", "major", "minor", "minor", "major", "major"]

const EXTRA_DEGREES = [{

  semis: 3

// ─── Chord colours — one per degree index + extras ────────────────────────────
// 0=I, 1=ii, 2=iii, 3=IV, 4=V, 5=vi, 6=vii, 7+=extras
const DEGREE_COLORS = ["#B8935A",
// I  — warm gold
"#5A7EB8",
// ii — slate blue
"#7A5AB8",
// iii — muted violet
"#5AB87A",
// IV — sage green
"#B85A5A",
// V  — dusty rose
"#5AABB8",
// vi — teal
"#8B7355",
// vii — tan
"#B8825A",
// extra 1
"#6B8FB8",
// extra 2
"#9B5AB8",
// extra 3
"#5AB8A0",
// extra 4
"#B8A05A",
// extra 5
"#8BB85A" // extra 6

function degreeColor(degIdx, extraIdx = 0) {
  if (degIdx >= 0 && degIdx < 7) return DEGREE_COLORS[degIdx];
  return DEGREE_COLORS[7 + extraIdx % 6];
}
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return {
    r,
    g,
    b
  };
}
function colorWithAlpha(hex, a) {
  const {
    r,
    g,
    b
  } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function intensityColor(v) {
  const t = v / 100;
  if (t < 0.5) {
    const f = t * 2;
    return `rgb(${Math.round(80 + f * 100)},${Math.round(100 + f * 40)},${Math.round(140 - f * 80)})`;
  }
  const f = (t - 0.5) * 2;
  return `rgb(${Math.round(180 + f * 30)},${Math.round(140 + f * 25)},${Math.round(60 + f * 20)})`;
}
function noteIdx(n) {
  return NOTES.indexOf(n);
}
function chordLabel(root, quality) {
  if (quality === "major") return root;
  if (quality === "minor") return root + "m";
  return root + "°";
}
function midiFreq(m) {
  return 440 * Math.pow(2, (m - 69) / 12);
}
function noteToMidi(n, oct) {
  return noteIdx(n) + (oct + 1) * 12;
}
function getChordFreqs(root, quality, oct = 3) {
  return CHORD_INTERVALS[quality].map(i => midiFreq(noteToMidi(root, oct) + i));
}
function getBassFreq(ch, oct = 2) {
  const m = {
    root: ch.root,
    "3rd": ch.third,
    "5th": ch.fifth

  return midiFreq(noteToMidi(m[ch.inversion] || ch.root, oct));

function buildDegree(key, scale, i) {

    id: `d-${key}-${scale}-${i}`,
    root,
    quality,
    label: chordLabel(root, quality),
    roman,
    third,
    fifth,
    degIdx: i,
    extraIdx: 0

    id: `x-${ex.label}`,
    root,
    quality: "major",
    label: root,
    roman: ex.label,
    third,
    fifth,
    degIdx: -1,
    extraIdx

// ─── Euclidean ────────────────────────────────────────────────────────────────
function euclidean(n, k) {
  if (k <= 0) return Array(n).fill(0);
  if (k >= n) return Array(n).fill(1);
  let pattern = [],
    counts = [],
    remainders = [],
    divisor = n - k;
  remainders.push(k);
  let level = 0;
  while (remainders[level] > 1) {
    counts.push(Math.floor(divisor / remainders[level]));
    remainders.push(divisor % remainders[level]);
    divisor = remainders[level];
    level++;
  }
  counts.push(divisor);
  const build = lv => {
    if (lv === -1) pattern.push(0);else if (lv === -2) pattern.push(1);else {
      for (let i = 0; i < counts[lv]; i++) build(lv - 1);
      if (remainders[lv] !== 0) build(lv - 2);
    }
  };
  build(level);
  const first = pattern.indexOf(1);
  return [...pattern.slice(first), ...pattern.slice(0, first)];
}
function applyIntensity(dyn, intensity, ts = "4/4") {

    n = TIME_SIGS[ts].steps;

    ...dyn,
    padFilter: Math.round(20 + t * 80),
    pianoMode: t >= 0.5 ? "quarter" : "full",
    pianoOctave: t >= 0.75,
    bassMode: t < 0.33 ? "full" : t < 0.66 ? "quarter" : "eighth",
    kickSteps: euclidean(n, Math.max(1, Math.round(t * (n * 0.6)) + 1)),
    shakerSteps: Math.round(t * (n * 0.5)) > 0 ? euclidean(n, Math.round(t * (n * 0.5))) : Array(n).fill(0),
    tambSteps: Math.round(t * (n * 0.4)) > 0 ? euclidean(n, Math.round(t * (n * 0.4))) : Array(n).fill(0)

}

// ─── Beat grid helpers ────────────────────────────────────────────────────────
// Flatten chords into a beat array for rendering
// Returns array of length = total beats used (may be multiple lines)
// Each slot: { chordIdx, isFirst, isLast, isSolo, chord } or null (empty)
function buildBeatGrid(chords, timeSig) {
  const bpb = TIME_SIGS[timeSig].beatsPerBar;
  const lpl = beatsPerLine(timeSig); // beats per line
  // Total beats: at least one full line, rounded up to full lines
  const totalChordBeats = chords.reduce((s, c) => s + c.beats, 0);
  const totalLines = Math.max(1, Math.ceil(totalChordBeats / lpl));
  const totalBeats = totalLines * lpl;
  const slots = Array(totalBeats).fill(null);
  let pos = 0;
  chords.forEach((ch, ci) => {
    for (let b = 0; b < ch.beats; b++) {
      if (pos + b < totalBeats) {
        slots[pos + b] = {
          chordIdx: ci,
          beatInChord: b,
          chord: ch
        };
      }
    }
    pos += ch.beats;
  });

  // Decorate with position info
  return slots.map((s, i) => {
    if (!s) return null;
    const prev = i > 0 ? slots[i - 1] : null;
    const next = i < slots.length - 1 ? slots[i + 1] : null;
    const isFirst = !prev || prev.chordIdx !== s.chordIdx;
    const isLast = !next || next.chordIdx !== s.chordIdx;
    return {
      ...s,
      isFirst,
      isLast,
      isSolo: isFirst && isLast,
      isBarRight: (i + 1) % bpb === 0 && i < slots.length - 1
    };
  });
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [songId, setSongId] = useState(() => uid());
  const [title, setTitle] = useState("NEW SONG");
  const [key, setKey] = useState("C");
  const [scale, setScale] = useState("major");
  const [bpm, setBpm] = useState(76);
  const [timeSig, setTimeSig] = useState("4/4");
  const tapRef = useRef([]);
  const [palette, setPalette] = useState(() => buildDefaultPalette("C", "major"));
  const [extraOn, setExtraOn] = useState([]);
  const [mix, setMix] = useState({
    ...DEFAULT_MIX
  });
  const [instruments, setInstruments] = useState({
    pad: true,
    piano: true,
    bass: true,
    kick: true,
    shaker: true,
    tamb: true
  });
  const [liveMute, setLiveMute] = useState({
    pad: false,
    piano: false,
    bass: false,
    kick: false,
    shaker: false,
    tamb: false
  });
  const [sections, setSections] = useState(() => {
    const pal = buildDefaultPalette("C", "major");
    const d = i => ({
      ...pal[i],
      id: uid(),
      beats: 4,
      inversion: "root"
    });
    return [{
      id: uid(),
      name: "Verse",
      repeats: 2,
      chords: [d(0), d(3), d(0), d(4)],
      dyn: defaultDyn("4/4")
    }, {
      id: uid(),
      name: "Chorus",
      repeats: 2,
      chords: [d(0), d(4), d(5), d(3)],
      dyn: {
        ...defaultDyn("4/4"),
        intensity: 60,
        ...applyIntensity(defaultDyn("4/4"), 60, "4/4")
      }
    }];
  });
  const [openSecId, setOpenSecId] = useState(null);
  const [addMenuOpen, setAddMenuOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [libraryOpen, setLibraryOpen] = useState(false);
  const [library, setLibrary] = useState(() => loadLibrary());
  const [saveFlash, setSaveFlash] = useState(false);
  const [ctxMenu, setCtxMenu] = useState(null);
  const [selChord, setSelChord] = useState(null);

  // playback
  const [playing, setPlaying] = useState(false);
  const [curSec, setCurSec] = useState(0);
  const [curChord, setCurChord] = useState(0);
  const [beatPulse, setBeatPulse] = useState(false);
  const [queued, setQueued] = useState(null);
  const [looping, setLooping] = useState(false);
  const psRef = useRef({
    s: 0,
    c: 0,
    b: 0,
    rep: 0,
    step: 0,
    queued: null,
    looping: false
  });
  const engRef = useRef(null);
  const secRef = useRef(sections);
  const instRef = useRef(instruments);
  const mixRef = useRef(mix);
  const liveMuteRef = useRef(liveMute);
  const tsRef = useRef(timeSig);
  const pulseTimer = useRef(null);
  useEffect(() => {
    secRef.current = sections;
  }, [sections]);
  useEffect(() => {
    instRef.current = instruments;
  }, [instruments]);
  useEffect(() => {
    mixRef.current = mix;
  }, [mix]);
  useEffect(() => {
    liveMuteRef.current = liveMute;
  }, [liveMute]);
  useEffect(() => {
    tsRef.current = timeSig;
  }, [timeSig]);

  // Pad player responds to live mute immediately
  useEffect(() => {
    if (!engRef.current?.padPlayer) return;
    if (liveMute.pad) {
      try {
        engRef.current.padPlayer.stop();
      } catch (e) {}
    } else if (playing && instruments.pad) {
      try {
        if (engRef.current.padPlayer.state === "stopped") engRef.current.padPlayer.start();
      } catch (e) {}
    }
  }, [liveMute.pad]);
  useEffect(() => {
    if (!engRef.current) return;
    const e = engRef.current,
      m = mix;
    const db = (v, b) => Tone.gainToDb(Math.max(0.001, v / 100)) + b;
    if (e.padPlayer) e.padPlayer.volume.value = db(m.pad, -10);
    if (e.pianoSampler) e.pianoSampler.volume.value = db(m.piano, -6);
    if (e.bassSynth) e.bassSynth.volume.value = db(m.bass, -8);
    if (e.kickPlayer) e.kickPlayer.volume.value = db(m.kick, -2);
    if (e.shakerPlayer) e.shakerPlayer.volume.value = db(m.shaker, -6);
    if (e.tambPlayer) e.tambPlayer.volume.value = db(m.tamb, -8);
  }, [mix]);

  // Palette rebuild
  const prevKS = useRef({
    key: "C",
    scale: "major"
  });
  useEffect(() => {
    if (key === prevKS.current.key && scale === prevKS.current.scale) return;
    prevKS.current = {
      key,
      scale
    };
    const dia = buildDefaultPalette(key, scale);
    const ext = extraOn.map((l, ei) => {
      const ex = EXTRA_DEGREES.find(e => e.label === l);
      return ex ? buildExtra(key, ex, ei) : null;
    }).filter(Boolean);
    setPalette([...dia, ...ext]);
  }, [key, scale, extraOn]);

  // Time sig change — resize steps
  const prevTS = useRef("4/4");
  useEffect(() => {
    if (timeSig === prevTS.current) return;
    prevTS.current = timeSig;
    const n = TIME_SIGS[timeSig].steps;
    setSections(s => s.map(x => ({
      ...x,
      dyn: {
        ...x.dyn,
        kickSteps: resize(x.dyn.kickSteps, n),
        shakerSteps: resize(x.dyn.shakerSteps, n),
        tambSteps: resize(x.dyn.tambSteps, n)
      }
    })));
  }, [timeSig]);
  const resize = (arr, n) => arr.length === n ? arr : arr.length > n ? arr.slice(0, n) : [...arr, ...Array(n - arr.length).fill(0)];
  const toggleExtra = ex => {
    const already = extraOn.includes(ex.label);
    if (already) {
      setExtraOn(e => e.filter(l => l !== ex.label));
      setPalette(p => p.filter(c => c.id !== `x-${ex.label}`));
    } else {
      const ei = extraOn.length;
      setExtraOn(e => [...e, ex.label]);
      setPalette(p => [...p, buildExtra(key, ex, ei)]);
    }
  };
  const tap = () => {
    const now = Date.now();
    tapRef.current = [...tapRef.current.filter(t => now - t < 3000), now];
    if (tapRef.current.length > 1) {
      const gaps = tapRef.current.slice(1).map((t, i) => t - tapRef.current[i]);
      setBpm(Math.round(60000 / (gaps.reduce((a, b) => a + b) / gaps.length)));
    }
  };

  // Library
  const snap = () => ({
    id: songId,
    title,
    key,
    scale,
    bpm,
    timeSig,
    palette,
    extraOn,
    mix,
    instruments,
    sections,
    savedAt: Date.now()
  });
  const saveSong = () => {
    const s = snap();
    setLibrary(lib => {
      const i = lib.findIndex(x => x.id === s.id);
      const n = i >= 0 ? lib.map((x, j) => j === i ? s : x) : [s, ...lib];
      saveLibrary(n);
      return n;
    });
    setSaveFlash(true);
    setTimeout(() => setSaveFlash(false), 1500);
  };
  const loadSong = s => {
    setSongId(s.id);
    setTitle(s.title);
    setKey(s.key);
    setScale(s.scale);
    setBpm(s.bpm);
    setTimeSig(s.timeSig);
    setPalette(s.palette);
    setExtraOn(s.extraOn || []);
    setMix(s.mix || {
      ...DEFAULT_MIX
    });
    setInstruments(s.instruments);
    setSections(s.sections);
    setLiveMute({
      pad: false,
      piano: false,
      bass: false,
      kick: false,
      shaker: false,
      tamb: false
    });
    prevKS.current = {
      key: s.key,
      scale: s.scale
    };
    prevTS.current = s.timeSig;
    setLibraryOpen(false);
    setOpenSecId(null);
  };
  const deleteSong = id => setLibrary(lib => {
    const n = lib.filter(s => s.id !== id);
    saveLibrary(n);
    return n;
  });
  const newSong = () => {
    const pal = buildDefaultPalette("C", "major");
    const d = i => ({
      ...pal[i],
      id: uid(),
      beats: 4,
      inversion: "root"
    });
    setSongId(uid());
    setTitle("NEW SONG");
    setKey("C");
    setScale("major");
    setBpm(76);
    setTimeSig("4/4");
    setPalette(pal);
    setExtraOn([]);
    setMix({
      ...DEFAULT_MIX
    });
    setInstruments({
      pad: true,
      piano: true,
      bass: true,
      kick: true,
      shaker: true,
      tamb: true
    });
    setLiveMute({
      pad: false,
      piano: false,
      bass: false,
      kick: false,
      shaker: false,
      tamb: false
    });
    setSections([{
      id: uid(),
      name: "Verse",
      repeats: 2,
      chords: [d(0), d(3), d(0), d(4)],
      dyn: defaultDyn("4/4")
    }, {
      id: uid(),
      name: "Chorus",
      repeats: 2,
      chords: [d(0), d(4), d(5), d(3)],
      dyn: {
        ...defaultDyn("4/4"),
        intensity: 60,
        ...applyIntensity(defaultDyn("4/4"), 60, "4/4")
      }
    }]);
    prevKS.current = {
      key: "C",
      scale: "major"
    };
    prevTS.current = "4/4";
    setOpenSecId(null);
  };

  // Section ops
  const updSec = (id, p) => setSections(s => s.map(x => x.id === id ? {
    ...x,
    ...p
  } : x));
  const remSec = id => {
    setSections(s => s.filter(x => x.id !== id));
    setOpenSecId(o => o === id ? null : o);
  };
  const addSec = () => {
    const id = uid();
    setSections(s => [...s, {
      id,
      name: "New Section",
      repeats: 1,
      chords: [],
      dyn: defaultDyn(timeSig)
    }]);
    setOpenSecId(id);
    setAddMenuOpen(false);
  };
  const dupSec = srcId => {
    const src = sections.find(x => x.id === srcId);
    if (!src) return;
    const id = uid();
    setSections(s => [...s, {
      ...JSON.parse(JSON.stringify(src)),
      id,
      name: src.name + " (copy)"
    }]);
    setOpenSecId(id);
    setAddMenuOpen(false);
  };

  // Add chord — appended, eats from empty space or last chord if full
  const addChord = (secId, palCh) => {
    setSections(s => s.map(x => {
      if (x.id !== secId) return x;
      const bpb = TIME_SIGS[timeSig].beatsPerBar;
      const defaultBeats = bpb;
      return {
        ...x,
        chords: [...x.chords, {
          id: uid(),
          label: palCh.label,
          roman: palCh.roman,
          root: palCh.root,
          quality: palCh.quality,
          third: palCh.third,
          fifth: palCh.fifth,
          beats: defaultBeats,
          inversion: "root",
          degIdx: palCh.degIdx,
          extraIdx: palCh.extraIdx || 0
        }]
      };
    }));
  };
  const cycleInv = (secId, chId) => setSections(s => s.map(x => x.id === secId ? {
    ...x,
    chords: x.chords.map(c => c.id === chId ? {
      ...c,
      inversion: INVERSIONS[(INVERSIONS.indexOf(c.inversion) + 1) % INVERSIONS.length]
    } : c)
  } : x));
  const remChord = (secId, chId) => setSections(s => s.map(x => x.id === secId ? {
    ...x,
    chords: x.chords.filter(c => c.id !== chId)
  } : x));
  const moveChord = (secId, chId, dir) => setSections(s => s.map(x => {
    if (x.id !== secId) return x;
    const arr = [...x.chords];
    const idx = arr.findIndex(c => c.id === chId);
    const to = idx + dir;
    if (idx < 0 || to < 0 || to >= arr.length) return x;
    [arr[idx], arr[to]] = [arr[to], arr[idx]];
    return {
      ...x,
      chords: arr
    };
  }));

  // Eat-next: expand chord by 1 beat, shrink next chord by 1 beat
  const expandChord = (secId, chIdx) => setSections(s => s.map(x => {
    if (x.id !== secId) return x;
    const arr = x.chords.map(c => ({
      ...c
    }));
    if (chIdx >= arr.length) return x;
    const next = arr[chIdx + 1];
    if (next && next.beats > 1) {
      // eat from next chord
      arr[chIdx].beats++;
      arr[chIdx + 1].beats--;
    } else if (!next) {
      // last chord — grow freely into empty space
      arr[chIdx].beats++;
    }
    // next chord has only 1 beat — can't expand (would eliminate it)
    return {
      ...x,
      chords: arr
    };
  }));

  // Shrink chord by 1 beat, give beat to next chord (or create empty)
  const shrinkChord = (secId, chIdx) => setSections(s => s.map(x => {
    if (x.id !== secId) return x;
    const arr = x.chords.map(c => ({
      ...c
    }));
    if (chIdx >= arr.length || arr[chIdx].beats <= 1) return x;
    arr[chIdx].beats--;
    if (arr[chIdx + 1]) arr[chIdx + 1].beats++;
    return {
      ...x,
      chords: arr
    };
  }));
  const updDyn = (id, p) => setSections(s => s.map(x => x.id === id ? {
    ...x,
    dyn: {
      ...x.dyn,
      ...p
    }
  } : x));
  const setIntensity = (id, val) => {
    const v = Math.round(Math.max(0, Math.min(100, val)));
    setSections(s => s.map(x => x.id !== id ? x : {
      ...x,
      dyn: applyIntensity({
        ...x.dyn,
        intensity: v
      }, v, timeSig)
    }));
  };
  const togStep = (secId, inst, i) => setSections(s => s.map(x => {
    if (x.id !== secId) return x;
    const st = [...x.dyn[inst]];
    st[i] = st[i] ? 0 : 1;
    return {
      ...x,
      dyn: {
        ...x.dyn,
        [inst]: st
      }
    };
  }));
  const moveSec = (id, dir) => setSections(s => {
    const idx = s.findIndex(x => x.id === id);
    const to = idx + dir;
    if (to < 0 || to >= s.length) return s;
    const arr = [...s];
    [arr[idx], arr[to]] = [arr[to], arr[idx]];
    return arr;
  });

  // Chord selection
  const selectChord = (secId, chordIdx) => {
    if (selChord && selChord.secId === secId && selChord.chordIdx === chordIdx) {
      setSelChord(null); // second tap deselects
    } else {
      setSelChord({
        secId,
        chordIdx
      });
    }
  };
  const clearSel = () => setSelChord(null);

  // Playback
  const stopPlayback = useCallback(() => {
    Tone.getTransport().stop();
    Tone.getTransport().cancel();
    if (engRef.current) {
      try {
        if (engRef.current.padPlayer && engRef.current.padPlayer.state === "started") engRef.current.padPlayer.stop();
      } catch (e) {}
      Object.values(engRef.current).forEach(n => {
        try {
          n?.dispose && n.dispose();
        } catch (e) {}
      });
      engRef.current = null;
    }
    setPlaying(false);
    setCurSec(0);
    setCurChord(0);
    setBeatPulse(false);
    setQueued(null);
    setLooping(false);
    setLiveMute({
      pad: false,
      piano: false,
      bass: false,
      kick: false,
      shaker: false,
      tamb: false
    });
    clearTimeout(pulseTimer.current);
    psRef.current = {
      s: 0,
      c: 0,
      b: 0,
      rep: 0,
      step: 0,
      queued: null,
      looping: false
    };
  }, []);
  const startPlayback = useCallback(async () => {
    const S = secRef.current;
    if (!S.length || !S.some(s => s.chords.length)) return;
    await Tone.start();
    Tone.getTransport().stop();
    Tone.getTransport().cancel();
    const m = mixRef.current;
    const db = (v, b) => Tone.gainToDb(Math.max(0.001, v / 100)) + b;
    const BASE = "https://philthemoser.github.io/qw-samples/";

    // ── Piano sampler — C major chords, pitch-shifted for other keys
    const pianoLPF = new Tone.Filter({
      type: "lowpass",
      frequency: 10000
    }).toDestination();
    const pianoBPF = new Tone.Filter({
      type: "bandpass",
      frequency: 800,
      Q: 0.5
    }).connect(pianoLPF);
    const pianoSampler = new Tone.Sampler({
      urls: {
        "C4": `${BASE}C.mp3`,
        "D4": `${BASE}Dm.mp3`,
        "E4": `${BASE}Em.mp3`,
        "F4": `${BASE}F.mp3`,
        "G4": `${BASE}G.mp3`,
        "A4": `${BASE}Am.mp3`
      },
      release: 2,
