function euclidean(n, k) {
  if (k <= 0) return Array(n).fill(0);

    remainders = [],

const LS_KEY = "qw_v1";
const LS_SETLIST = "qw_setlist_v1";
function loadLibrary() {
  try {
    return JSON.parse(localStorage.getItem(LS_KEY) || "[]");
  } catch (e) {
    return [];
  }
}
function saveLibrary(lib) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(lib));
  } catch (e) {}
}
function loadSetlist() {
  try {
    return JSON.parse(localStorage.getItem(LS_SETLIST) || "[]");
  } catch (e) {
    return [];
  }
}
function saveSetlist(ids) {
  try {
    localStorage.setItem(LS_SETLIST, JSON.stringify(ids));
  } catch (e) {}
}
const defaultDyn = (ts = "4/4") => {

    intensity: 30,

    pianoFilter: 44,

    bassSteps: euclidean(n, 1),

    shakerMuted: false,
    shakerSteps: euclidean(n, 1),
    tambMuted: false,
    tambSteps: Array(n).fill(0)
  };
};

// ─── Beat grid helpers ────────────────────────────────────────────────────────
// Flatten chords into a beat array for rendering
// Returns array of length = total beats used (may be multiple lines)
// Each slot: { chordIdx, isFirst, isLast, isSolo, chord } or null (empty)
function buildBeatGrid(chords, timeSig) {
  const bpb = TIME_SIGS[timeSig].beatsPerBar;
  const lpl = beatsPerLine(timeSig); // beats per line
  // Total beats: at least one full line, rounded up to full lines
  const totalChordBeats = chords.reduce((s, c) => s + c.beats, 0);
  const totalLines = Math.max(1, Math.ceil(totalChordBeats / lpl));
  const totalBeats = totalLines * lpl;
  const slots = Array(totalBeats).fill(null);
  let pos = 0;
  chords.forEach((ch, ci) => {
    for (let b = 0; b < ch.beats; b++) {
      if (pos + b < totalBeats) {
        slots[pos + b] = {
          chordIdx: ci,
          beatInChord: b,
          chord: ch
        };
      }
    }
    pos += ch.beats;
  });

  // Decorate with position info
  return slots.map((s, i) => {
    if (!s) return null;
    const prev = i > 0 ? slots[i - 1] : null;
    const next = i < slots.length - 1 ? slots[i + 1] : null;
    const isFirst = !prev || prev.chordIdx !== s.chordIdx;
    const isLast = !next || next.chordIdx !== s.chordIdx;
    return {
      ...s,
      isFirst,
      isLast,
      isSolo: isFirst && isLast,
      isBarRight: (i + 1) % bpb === 0 && i < slots.length - 1
    };
  });
}

  const [scale, setScale] = useState("major");
  const [bpm, setBpm] = useState(DEMO_SONG.bpm);
  const [timeSig, setTimeSig] = useState(DEMO_SONG.timeSig);
  const tapRef = useRef([]);
  const [palette, setPalette] = useState(() => buildDefaultPalette("C", "major"));
  const [extraOn, setExtraOn] = useState([]);
  const [mix, setMix] = useState({

  const [instruments, setInstruments] = useState({

    piano: true,
    bass: true,

    shaker: true,

  const [liveMute, setLiveMute] = useState({

  const [sections, setSections] = useState(() => DEMO_SONG.sections.map(s => ({

  })));
  const [openSecId, setOpenSecId] = useState(null);
  const [addMenuOpen, setAddMenuOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(null); // null | "left" | "right"
  const [liveKeyOpen, setLiveKeyOpen] = useState(false); // key list during playback
  const [liveTempoOpen, setLiveTempoOpen] = useState(false); // tempo nudge during playback
  const [liveMixerOpen, setLiveMixerOpen] = useState(false); // mixer faders during playback
  const [livePadsOpen, setLivePadsOpen] = useState(false); // chord sketchpad in build mode
  const [libraryOpen, setLibraryOpen] = useState(false);

  const [setlistIds, setSetlistIds] = useState(() => loadSetlist());
  const [libView, setLibView] = useState("library"); // "library" | "setlist"

  const [expMenuOpen, setExpMenuOpen] = useState(false);
  const [saveFlash, setSaveFlash] = useState(false);
  const [dirty, setDirty] = useState(false);
  const loadingRef = useRef(true); // suppress dirty during load/init

  const [playing, setPlaying] = useState(false);
  const [samplesLoading, setSamplesLoading] = useState(false);

  const [looping, setLooping] = useState(false);
  const [resolved, setResolved] = useState(false); // song played through — pad-only

  useEffect(() => {

  useEffect(() => {

  useEffect(() => {

  }, [liveMute]);
  useEffect(() => {
    tsRef.current = timeSig;

  useEffect(() => {
    keyRef.current = key;
    // Live capo: update the piano bus PitchShift when the key changes.
    if (engRef.current?.pianoShift) {
      try {
        engRef.current.pianoShift.pitch = keyShift(key);
      } catch (e) {}
    }
    // Live pad swap: crossfade to the new key's loop. Start the new loop now
    // and ramp the old one out / new one in over ~1.5s, so the pad follows the
    // key almost immediately with no click (better than waiting for the loop
    // boundary, which could be a full cycle away). Load-on-demand.
    const e = engRef.current;
    if (!playing || !e?.padPlayer || !e.padHPF) return;
    const BASE = "https://philthemoser.github.io/qw-samples/";
    let cancelled = false;
    const oldPlayer = e.padPlayer;
    const targetVol = oldPlayer.volume.value; // dB the pad currently sits at
    const next = new Tone.Player({
      url: padUrl(key, BASE),
      loop: true,
      autostart: false
    }).connect(e.padHPF);
    next.volume.value = -60; // start silent, fade in
    Tone.loaded().then(() => {
      if (cancelled) {
        try {
          next.dispose();
        } catch (_) {}
        return;
      }
      if (keyRef.current !== key || !engRef.current || engRef.current.padPlayer !== oldPlayer) {
        try {
          next.dispose();
        } catch (_) {}
        return;
      }
      try {
        const t = Tone.now();
        next.sync().start(); // start on the transport now
        next.volume.rampTo(targetVol, 1.5, t); // fade new in
        oldPlayer.volume.rampTo(-60, 1.5, t); // fade old out
        engRef.current.padPlayer = next;
        // Dispose the old one after the crossfade completes
        setTimeout(() => {
          try {
            oldPlayer.unsync();
            oldPlayer.stop();
            oldPlayer.dispose();
          } catch (_) {}
        }, 1800);
      } catch (err) {
        try {
          next.dispose();
        } catch (_) {}
      }
    });
    return () => {
      cancelled = true;
    };
  }, [key]);

  // Live filter response: apply the CURRENT section's pad & piano filter values
  // straight to the filter nodes whenever they change (or the section changes),
  // so dragging the sliders is heard immediately — not only at the next chord.
  const curDyn = playing ? sections[curSec]?.dyn : null;
  useEffect(() => {
    const e = engRef.current;
    if (!e || !curDyn) return;
    // Exponential map so the whole slider travel is audible (hearing is log).
    const expMap = (t, lo, hi) => lo * Math.pow(hi / lo, Math.max(0, Math.min(1, t)));
    // Pad — continuous loop. Lowpass sweeps 350Hz (dark) → 18kHz (open) so
    // closing it genuinely darkens the body of the pad, not just faint air.
    if (e.padFilt) {
      const t = (curDyn.padFilter ?? 44) / 100;
      const lpFreq = expMap(t, 350, 18000);
      try {
        e.padFilt.frequency.rampTo(lpFreq, 0.08);
      } catch (_) {}
    }
    // Piano — lowpass sweeps 500Hz (warm) → 12kHz (bright); attack softens too.
    if (e.pianoLPF) {
      const pf = (curDyn.pianoFilter ?? 50) / 100;
      try {
        e.pianoLPF.frequency.rampTo(expMap(pf, 500, 12000), 0.08);
      } catch (_) {}
      try {
        e.piano.attack = 0.3 - pf * 0.28;
      } catch (_) {}
    }
  }, [curDyn?.padFilter, curDyn?.pianoFilter, curSec, playing]);

  // Pad player responds to live mute via volume (synced player can't use start/stop)
  useEffect(() => {
    if (!engRef.current?.padPlayer) return;
    if (liveMute.pad) {
      engRef.current.padPlayer.volume.value = -Infinity;
    } else {
      const db = (v, b) => Tone.gainToDb(Math.max(0.001, v / 100)) + b;
      engRef.current.padPlayer.volume.value = db(mixRef.current.pad, -10);
    }
  }, [liveMute.pad]);
  useEffect(() => {
    if (!engRef.current) return;
    const e = engRef.current,
      m = mix;
    const db = (v, b) => Tone.gainToDb(Math.max(0.001, v / 100)) + b;
    if (e.padPlayer) e.padPlayer.volume.value = db(m.pad, -10);
    if (e.piano) e.piano.volume.value = db(m.piano, -6);
    if (e.bassSynth) e.bassSynth.volume.value = db(m.bass, -8);
    if (e.kickPlayer) e.kickPlayer.volume.value = db(m.kick, -2);
    if (e.shakerPlayer) e.shakerPlayer.volume.value = db(m.shaker, -6);
    if (e.tambPlayer) e.tambPlayer.volume.value = db(m.tamb, -8);
  }, [mix]);

  // Live tempo: nudging BPM updates the running transport immediately.
  useEffect(() => {
    if (engRef.current) {
      try {
        Tone.getTransport().bpm.rampTo(bpm, 0.1);
      } catch (e) {}
    }
  }, [bpm]);

  // Live nudge helpers for the playing-mode controls
  const nudgeMix = (k, delta) => setMix(m => ({
    ...m,
    [k]: Math.max(0, Math.min(100, (m[k] ?? 70) + delta))
  }));
  const nudgeBpm = delta => setBpm(b => Math.max(40, Math.min(240, b + delta)));

  // Palette rebuild + remap section chords to new key
  const prevKS = useRef({
    key: "C",
    scale: "major"
  });
  useEffect(() => {
    if (key === prevKS.current.key && scale === prevKS.current.scale) return;
    prevKS.current = {
      key,
      scale
    };
    const dia = buildDefaultPalette(key, scale);
    const ext = extraOn.map((l, ei) => {
      const ex = EXTRA_DEGREES.find(e => e.label === l);
      return ex ? buildExtra(key, ex, ei) : null;
    }).filter(Boolean);
    const newPalette = [...dia, ...ext];
    setPalette(newPalette);
    // Remap every chord in every section to the new key
    setSections(secs => secs.map(sec => ({
      ...sec,
      chords: sec.chords.map(ch => {
        if (ch.degIdx >= 0) {
          // Diatonic chord — look up new root from new palette
          const match = newPalette.find(p => p.degIdx === ch.degIdx);
          if (match) return {
            ...ch,
            root: match.root,
            label: match.label,
            third: match.third,
            fifth: match.fifth
          };
        } else {
          // Extra chord — pitch-shift by same semitone interval
          const ex = EXTRA_DEGREES.find(e => e.label === ch.roman);
          if (ex) {
            const rebuilt = buildExtra(key, ex, ch.extraIdx || 0);
            return {
              ...ch,
              root: rebuilt.root,
              label: rebuilt.label,
              third: rebuilt.third,
              fifth: rebuilt.fifth
            };
          }
        }
        return ch;
      })
    })));
  }, [key, scale, extraOn]);

  // Time sig change — resize steps
  const prevTS = useRef("4/4");
  useEffect(() => {
    if (timeSig === prevTS.current) return;
    prevTS.current = timeSig;
    const n = TIME_SIGS[timeSig].steps;
    setSections(s => s.map(x => ({
      ...x,
      dyn: {
        ...x.dyn,
        bassSteps: resize(x.dyn.bassSteps || [], n),
        kickSteps: resize(x.dyn.kickSteps, n),
        shakerSteps: resize(x.dyn.shakerSteps, n),
        tambSteps: resize(x.dyn.tambSteps, n)
      }
    })));
  }, [timeSig]);
  const resize = (arr, n) => arr.length === n ? arr : arr.length > n ? arr.slice(0, n) : [...arr, ...Array(n - arr.length).fill(0)];
  const toggleExtra = ex => {
    const already = extraOn.includes(ex.label);
    if (already) {
      setExtraOn(e => e.filter(l => l !== ex.label));
      setPalette(p => p.filter(c => c.id !== `x-${ex.label}`));
    } else {
      const ei = extraOn.length;
      setExtraOn(e => [...e, ex.label]);
      setPalette(p => [...p, buildExtra(key, ex, ei)]);
    }
  };
  const tap = () => {
    const now = Date.now();
    tapRef.current = [...tapRef.current.filter(t => now - t < 3000), now];
    if (tapRef.current.length > 1) {
      const gaps = tapRef.current.slice(1).map((t, i) => t - tapRef.current[i]);
      setBpm(Math.round(60000 / (gaps.reduce((a, b) => a + b) / gaps.length)));
    }
  };

  // Library
  const snap = () => ({
    id: songId,
    title,
    key,
    scale,
    bpm,
    timeSig,
    palette,
    extraOn,
    mix,
    instruments,
    sections,
    savedAt: Date.now()
  });

  // Mark the song dirty whenever its content changes (but not during load/init).
  useEffect(() => {
    if (loadingRef.current) {
      loadingRef.current = false;
      return;
    }
    setDirty(true);
    setSaveFlash(false);
  }, [title, key, bpm, timeSig, palette, extraOn, mix, instruments, sections]);
  const saveSong = () => {
    const s = snap();
    setLibrary(lib => {
      const i = lib.findIndex(x => x.id === s.id);
      const n = i >= 0 ? lib.map((x, j) => j === i ? s : x) : [s, ...lib];
      saveLibrary(n);
      return n;
    });
    setDirty(false);
    setSaveFlash(true); // Saved stays until the next real edit
  };
  // Save the current song silently (used by auto-save on navigation)
  const saveSongSilent = () => {
    const s = snap();
    setLibrary(lib => {
      const i = lib.findIndex(x => x.id === s.id);
      const n = i >= 0 ? lib.map((x, j) => j === i ? s : x) : [s, ...lib];
      saveLibrary(n);
      return n;
    });
  };
  const loadSong = s => {
    if (dirty) saveSongSilent(); // auto-save current edits before switching away
    loadingRef.current = true; // suppress dirty for the load that follows
    setSongId(s.id);
    setTitle(s.title);
    setKey(s.key);
    setScale("major");
    setBpm(s.bpm);
    setTimeSig(s.timeSig);
    setPalette(s.palette);
    setExtraOn(s.extraOn || []);
    setMix(s.mix || {
      ...DEFAULT_MIX
    });
    setInstruments(s.instruments);
    // Migrate: merge saved dyn over fresh defaults so songs saved before
    // bassSteps/pianoFilter existed still play correctly
    setSections((s.sections || []).map(sec => ({
      ...sec,
      dyn: {
        ...defaultDyn(s.timeSig || "4/4"),
        ...(sec.dyn || {})
      }
    })));
    setLiveMute({
      pad: false,
      piano: false,
      bass: false,
      kick: false,
      shaker: false,
      tamb: false
    });

      key: s.key,

    };

    setDirty(false);
    setSaveFlash(false);
    setLibraryOpen(false);
    setOpenSecId(null);
  };
  const deleteSong = id => {
    setLibrary(lib => {
      const n = lib.filter(s => s.id !== id);
      saveLibrary(n);
      return n;
    });
    setSetlistIds(ids => {

      saveSetlist(n);
      return n;
    }); // also drop from setlist
  };
  const toggleSetlist = id => setSetlistIds(ids => {

  });
  const moveInSetlist = (id, dir) => setSetlistIds(ids => {
    const i = ids.indexOf(id),

  // Export a song to the clipboard as pretty-printed JSON

  const exportSong = async s => {
    const json = JSON.stringify(s, null, 2);

      await navigator.clipboard.writeText(json);
      setCopiedId(s.id);
      setTimeout(() => setCopiedId(null), 1600);
    } catch (e) {
      // Fallback: put it in the import box area as selectable text
      setImportMsg("Clipboard blocked — copy manually:\n\n" + json);
    }
  };
  // Import a song from the clipboard; validate, assign fresh id, fill defaults
  const importSong = async () => {
    let text = "";
    try {
      text = await navigator.clipboard.readText();
    } catch (e) {
      setImportMsg("Couldn't read clipboard. Paste permission may be blocked.");
      return;
    }
    if (!text || !text.trim()) {
      setImportMsg("Clipboard is empty.");
      return;
    }

    try {
      obj = JSON.parse(text);
    } catch (e) {
      setImportMsg("That doesn't look like a valid song (JSON parse failed).");
      return;
    }
    if (!obj || !obj.title || !Array.isArray(obj.sections) || !Array.isArray(obj.palette)) {
      setImportMsg("Missing required fields (title, sections, palette).");
      return;
    }
    // Fresh id so it never overwrites; fill missing fields from defaults
    const migrated = {
      id: uid(),
      title: obj.title,
      key: obj.key || "C",
      scale: "major",
      bpm: obj.bpm || 76,
      timeSig: TIME_SIGS[obj.timeSig] ? obj.timeSig : "4/4",
      palette: obj.palette,
      extraOn: obj.extraOn || [],
      mix: {
        ...DEFAULT_MIX,
        ...(obj.mix || {})
      },
      instruments: {
        pad: true,
        piano: true,

      },

        }
      })),

    };

      const n = [migrated, ...lib];
      saveLibrary(n);
      return n;
    });

  const newSong = () => {

    const pal = buildDefaultPalette("C", "major");
    setSongId(uid());

    setKey("C");
    setScale("major");
    setBpm(76);
    setTimeSig("4/4");
    setPalette(pal);
    setExtraOn([]);
    setMix({
      ...DEFAULT_MIX
    });
    setInstruments({
      pad: true,
      piano: true,
      bass: true,
      kick: true,
      shaker: true,
      tamb: true
    });

      pad: false,
      piano: false,
      bass: false,
      kick: false,
      shaker: false,
      tamb: false
    });

    setSections([{
      id: uid(),
      name: "Intro",
      repeats: 2,

      dyn: defaultDyn("4/4")
    }]);
    setDirty(false);
    setSaveFlash(false);
    prevKS.current = {
      key: "C",
      scale: "major"
    };
    prevTS.current = "4/4";
    setOpenSecId(null);
  };

  // ── Whole-library / setlist backup: download & upload a .json file ──────────
  const downloadJSON = (data, filename) => {
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    } catch (e) {
      setImportMsg("Couldn't create the download file.");
    }
  };
  const exportAll = () => {
    // Export everything: all library songs plus the setlist order.
    downloadJSON({
      type: "qw-library",
      version: 1,
      songs: library,
      setlist: setlistIds
    }, `chord-groove-library-${new Date().toISOString().slice(0, 10)}.json`);
  };
  const exportSetlistFile = () => {
    // Export just the setlist songs (in order) as a shareable set.
    const songs = setlistIds.map(id => library.find(s => s.id === id)).filter(Boolean);
    if (songs.length === 0) {
      setImportMsg("Your setlist is empty.");
      return;
    }
    downloadJSON({
      type: "qw-setlist",
      version: 1,
      songs,
      setlist: songs.map(s => s.id)
    }, `chord-groove-setlist-${new Date().toISOString().slice(0, 10)}.json`);
  };
  const fileInputRef = useRef(null);
  const importFromFile = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const incoming = Array.isArray(data) ? data : data.songs;
        if (!Array.isArray(incoming)) {
          setImportMsg("That file doesn't contain any songs.");
          return;
        }
        // Give every imported song a fresh id so nothing is overwritten
        const idMap = {};
        const migrated = incoming.filter(o => o && o.title && Array.isArray(o.sections)).map(o => {
          const nid = uid();
          idMap[o.id] = nid;
          return {
            ...o,
            id: nid,
            scale: "major",
            timeSig: TIME_SIGS[o.timeSig] ? o.timeSig : "4/4",
            mix: {
              ...DEFAULT_MIX,
              ...(o.mix || {})
            }
          };
        });
        if (migrated.length === 0) {
          setImportMsg("No valid songs found in that file.");
          return;
        }
        setLibrary(lib => {
          const n = [...migrated, ...lib];
          saveLibrary(n);
          return n;
        });
        // If the file carried a setlist order, append those songs to the setlist
        if (Array.isArray(data.setlist)) {
          const newSetIds = data.setlist.map(oldId => idMap[oldId]).filter(Boolean);
          if (newSetIds.length) setSetlistIds(ids => {
            const n = [...ids, ...newSetIds];
            saveSetlist(n);
            return n;
          });
        }
        setImportMsg(`Imported ${migrated.length} song${migrated.length > 1 ? "s" : ""} from file.`);
      } catch (err) {
        setImportMsg("Couldn't read that file (invalid JSON).");
      }
    };
    reader.readAsText(file);
    e.target.value = ""; // allow re-importing the same file
  };

  // Section ops
  const updSec = (id, p) => setSections(s => s.map(x => x.id === id ? {
    ...x,
    ...p
  } : x));
  const remSec = id => {
    setSections(s => s.filter(x => x.id !== id));
    setOpenSecId(o => o === id ? null : o);
  };
  const addSec = () => {
    const id = uid();
    setSections(s => [...s, {
      id,
      name: "New Section",
      repeats: 1,
      chords: [],
      dyn: defaultDyn(timeSig)
    }]);
    setOpenSecId(id);
    setAddMenuOpen(false);
  };
  const dupSec = srcId => {
    const src = sections.find(x => x.id === srcId);
    if (!src) return;
    const id = uid();
    setSections(s => [...s, {
      ...JSON.parse(JSON.stringify(src)),
      id,
      name: src.name + " (copy)"
    }]);
    setOpenSecId(id);
    setAddMenuOpen(false);
  };

  // Add chord — appended, eats from empty space or last chord if full
  const addChord = (secId, palCh) => {
    let newIdx = 0;
    setSections(s => s.map(x => {
      if (x.id !== secId) return x;
